name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Deploy via SSM
        uses: aws-actions/aws-ssm-send-command@v1
        id: deploy
        with:
          instance-ids: ${{ secrets.EC2_INSTANCE_ID }}
          document-name: AWS-RunShellScript
          parameters: |
            commands:
              - |
                set -e
                echo "=== Starting deployment ==="
                cd /opt/evoliss/current

                echo "=== Pulling latest code ==="
                git fetch origin main
                git reset --hard origin/main

                echo "=== Installing dependencies ==="
                npm ci --production=false

                echo "=== Running Prisma migration ==="
                npx prisma migrate deploy

                echo "=== Building application ==="
                npm run build

                echo "=== Restarting application ==="
                pm2 restart evoliss || pm2 start ecosystem.config.js

                echo "=== Deployment complete ==="

      - name: Wait for command to complete
        run: |
          COMMAND_ID="${{ steps.deploy.outputs.command-id }}"
          echo "Waiting for SSM command: $COMMAND_ID"
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            2>/dev/null || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'Status' --output text)

          echo "Command status: $STATUS"

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'StandardOutputContent' --output text)
          echo "$OUTPUT"

          if [ "$STATUS" != "Success" ]; then
            ERROR=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'StandardErrorContent' --output text)
            echo "=== ERROR OUTPUT ==="
            echo "$ERROR"
            exit 1
          fi
